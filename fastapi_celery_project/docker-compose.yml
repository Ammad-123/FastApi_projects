version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    command: python celery_worker.py
    volumes:
      - ./app:/app
    depends_on:
      - redis